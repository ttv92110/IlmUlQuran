<body>
  <header>
    <div class="container">
      <h1 class="logo">علم القرآن</h1>
      <nav id="mainNav">
        <button id="hamburgerBtn" aria-label="Toggle navigation">☰</button>
        <ul id="navLinks">
          <li><a href="/">Home</a></li>
          <li><a href="/quran">Quran</a></li>
          <li><a href="/search">Search</a></li>
          <li><a href="/abjad">Abjad</a></li>
          <li><a href="/analytics">Analytics</a></li>
          <li><a id="adminLink" href="/admin" style="display:none;">Admin</a></li>
          <li>
            <select id="langSelector" aria-label="Select language">
              <option value="ur">اردو</option>
              <option value="en">English</option>
              <option value="hi">हिन्दी</option>
              <option value="tr">Türkçe</option>
              <option value="id">Bahasa Indonesia</option>
              <option value="fa">فارسی</option>
            </select>
          </li>
          <li>
            <form id="globalSearchForm" action="/search" method="GET">
              <input type="text" name="q" placeholder="Search..." aria-label="Search" />
              <button type="submit">🔍</button>
            </form>
          </li>
          <li>
            <div id="auth-buttons"></div>
          </li>
        </ul>
      </nav>
    </div>
    
    <!-- Global Loader (hidden by default) -->
    <div id="globalLoader" class="loader-overlay">
    <div class="loader-spinner"></div>
    <div class="loader-text" id="loaderText">Loading...</div>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>© 2025 Ilm Ul Quran — Open source knowledge platform</p>
  </footer>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/auth.js"></script>
  <script>
    (function() {
      // ہیمبرگر مینو
      const hamburger = document.getElementById('hamburgerBtn');
      const navLinks = document.getElementById('navLinks');
      if (hamburger && navLinks) {
        hamburger.addEventListener('click', function() {
          navLinks.classList.toggle('open');
        });
      }

      // زبان کا انتخاب
      const langSelector = document.getElementById('langSelector');
      const savedLang = localStorage.getItem('preferred_language') || 'ur';
      langSelector.value = savedLang;
      langSelector.addEventListener('change', function() {
        const newLang = this.value;
        localStorage.setItem('preferred_language', newLang);
        window.location.reload();
      });

      // نیویگیشن اور ایڈمن لنک اپ ڈیٹ
      async function updateNav() {
        const authDiv = document.getElementById('auth-buttons');
        const adminLink = document.getElementById('adminLink');
        const token = localStorage.getItem('access_token');
        if (token) {
          try {
            const user = await apiRequest('/auth/me');
            if (user && (user.role === 'admin' || user.role === 'super_admin' || user.role === 'moderator')) {
              adminLink.style.display = 'inline';
            } else {
              adminLink.style.display = 'none';
            }
            authDiv.innerHTML = `<button class="btn-logout" onclick="logout()">Logout</button>`;
          } catch(e) {
            authDiv.innerHTML = `<a href="/login">Login</a> | <a href="/register">Register</a>`;
            adminLink.style.display = 'none';
          }
        } else {
          authDiv.innerHTML = `<a href="/login">Login</a> | <a href="/register">Register</a>`;
          adminLink.style.display = 'none';
        }
      }
      updateNav();
    })();
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
