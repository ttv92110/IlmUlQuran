{% extends "base.html" %}

{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<div class="container">
  <h1>🛡️ Admin Panel</h1>
  <div id="adminSection">
    <h2>⬆️ Upload Ayah</h2>
    <form id="uploadForm" style="background:#fef9ef; padding:1.5rem; border-radius:30px;">
      <input name="surah" placeholder="Surah Number" required>
      <input name="ayah_number" placeholder="Ayah Number" required>
      <textarea name="arabic_text" placeholder="Arabic text" rows="3" required></textarea>
      <input name="waqf" placeholder="Waqf symbol (optional)">
      <label><input type="checkbox" name="sajdah"> Sajdah</label>
      <label><input type="checkbox" name="rukuEnd"> Ruku End</label>
      <button type="submit">Upload Ayah</button>
    </form>
    <hr>
    <h2>⏳ Pending Notes</h2>
    <div id="pendingNotes"></div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  (function() {
    const token = localStorage.getItem('access_token');
    if (!token) window.location.href = '/login';

    async function loadPendingNotes() {
      try {
        const notes = await apiRequest('/admin/notes/pending');
        document.getElementById('pendingNotes').innerHTML = notes.map(n => `
          <div>${n.content}<div><button onclick="verifyNote('${n.note_id}', 'verified')">✅ Verify</button><button onclick="verifyNote('${n.note_id}', 'rejected')">❌ Reject</button></div></div>
        `).join('');
      } catch(e) { console.error(e); }
    }

    
    window.verifyNote = async (id, status) => {
    const btns = document.querySelectorAll(`[data-id="${id}"]`);
    btns.forEach(b => setButtonLoading(b, true));
    try {
        await apiRequest(`/admin/notes/verify/${id}`, { method: 'POST', body: JSON.stringify({ status }) });
        loadPendingNotes();
    } catch(err) {
        alert('Verification failed: ' + err.message);
    } finally {
        btns.forEach(b => setButtonLoading(b, false));
    }
    };

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        setButtonLoading(btn, true);
        try {
            const formData = new FormData(e.target);
            const data = {
                surah: parseInt(formData.get('surah')),
                ayah_number: parseInt(formData.get('ayah_number')),
                arabic_text: formData.get('arabic_text'),
                waqf: formData.get('waqf') || null,
                sajdah: formData.has('sajdah'),
                rukuEnd: formData.has('rukuEnd')
            };
            await apiRequest('/admin/ayah/upload', { method: 'POST', body: JSON.stringify(data) });
            alert('Ayah uploaded');
            e.target.reset();
        } catch(err) {
            alert('Upload failed: ' + err.message);
        } finally {
            setButtonLoading(btn, false);
        }
    });

    loadPendingNotes();
  })();
</script>
{% endblock %}
